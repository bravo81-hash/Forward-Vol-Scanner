<!DOCTYPE html>
<html lang="en"><head><meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>TE Playbook — Trade Selection</title>
<style>
:root{--ink:#0E1116;--panel:#161B22;--p2:#1C232C;--line:#2A3340;--txt:#DCE3EA;
--mut:#8A94A1;--jade:#3FB68B;--red:#D45D5D;--amber:#E8A33D;
--mono:"SF Mono","Cascadia Code",Consolas,monospace;
--disp:"Avenir Next Condensed","Arial Narrow",sans-serif}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--ink);color:var(--txt);font:14px/1.5 -apple-system,"Segoe UI",Roboto,sans-serif;padding:20px}
header{display:flex;align-items:baseline;gap:18px;flex-wrap:wrap;margin-bottom:16px}
h1{font-family:var(--disp);font-size:24px;letter-spacing:.05em;text-transform:uppercase}
h1 b{color:var(--amber)}
.tabs button,.modes button{background:var(--panel);border:1px solid var(--line);color:var(--txt);
padding:6px 14px;font:inherit;cursor:pointer}
.tabs button.on{border-color:var(--amber);color:var(--amber)}
.modes button.on{border-color:var(--jade);color:var(--jade)}
#scan{background:var(--amber);color:#000;border:none;padding:7px 18px;font-weight:600;cursor:pointer}
#sentinel{background:var(--jade);color:#000;border:none;padding:7px 18px;font-weight:600;cursor:pointer}
#status{font-family:var(--mono);font-size:11px;color:var(--mut)}
.verdict{font-family:var(--disp);font-size:19px;text-transform:uppercase;letter-spacing:.04em;
padding:10px 14px;border-left:4px solid var(--mut);background:var(--panel);margin:14px 0}
.verdict.go{border-color:var(--jade)} .verdict.warn{border-color:var(--amber)} .verdict.stop{border-color:var(--red)}
.ctxrow{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:14px}
.chip{background:var(--panel);border:1px solid var(--line);padding:5px 10px;font-family:var(--mono);font-size:11px}
.chip b{color:var(--amber)}
.warnbox{border:1px solid var(--red);background:rgba(212,93,93,.08);padding:8px 12px;font-size:13px;margin-bottom:12px}
.cards{display:grid;grid-template-columns:repeat(auto-fill,minmax(430px,1fr));gap:14px}
.card{background:var(--panel);border:1px solid var(--line);border-radius:6px;padding:14px}
.card h3{font-family:var(--disp);font-size:16px;text-transform:uppercase;letter-spacing:.05em}
.card .fam{font-family:var(--mono);font-size:10px;color:var(--amber);text-transform:uppercase;letter-spacing:.12em}
.legs{font-family:var(--mono);font-size:12px;color:var(--txt);margin:7px 0;line-height:1.7}
.nums{display:flex;gap:16px;flex-wrap:wrap;font-family:var(--mono);font-size:12px;margin:6px 0}
.nums span b{display:block;font-size:10px;color:var(--mut);font-weight:400;text-transform:uppercase}
.pos{color:var(--jade)}.neg{color:var(--red)}.amb{color:var(--amber)}
.why{font-size:12px;color:var(--mut);margin:8px 0}
.why li{margin-left:16px}
.cbtns{display:flex;gap:8px;margin-top:8px}
.cbtns button{background:var(--p2);border:1px solid var(--line);color:var(--txt);padding:5px 12px;font:inherit;font-size:12px;cursor:pointer}
.cbtns button.stagebtn{border-color:var(--jade);color:var(--jade)}
svg{width:100%;display:block;margin-top:8px;background:var(--ink);border:1px solid var(--line)}
.bookbar{font-family:var(--mono);font-size:11px;color:var(--mut);margin:6px 0 14px}
.toast{position:fixed;bottom:18px;right:18px;background:var(--p2);border:1px solid var(--jade);
padding:10px 16px;font-family:var(--mono);font-size:12px;display:none;max-width:420px}
</style></head><body>
<header>
 <h1>TE <b>Playbook</b></h1>
 <span class="tabs" id="tabs"></span>
 <span class="modes" id="modes">
   <button data-m="mock" class="on">mock</button><button data-m="live">live</button></span>
 <select id="acct" style="background:var(--panel);border:1px solid var(--line);color:var(--txt);padding:6px"></select>
 <button id="scan">Scan</button>
 <button id="sentinel" title="Portfolio adjustment advisor — per-account guidance">Sentinel</button>
 <button id="direction" title="Objective structure selection — delta vs vol play, then the ranked structure for your intent">Direction</button>
 <button id="smsf" title="SMSF cash account — single-expiry structure selection (Gate S): IV band × 25Δ skew × bias, with full build specs">SMSF</button>
 <span id="status">idle</span>
 <span style="margin-left:auto;font-family:var(--mono);font-size:11px">
  <a href="/campaigns" style="color:var(--jade);font-weight:700">Campaign v3</a> ·
  <a href="/static/smsf_playbook.html" target="_blank" style="color:var(--mut)">SMSF Guide</a> ·
  <a href="/static/te_playbook.html" target="_blank" style="color:var(--mut)">TE Playbook</a> ·
  <a href="/static/sentinel_matrix.html" target="_blank" style="color:var(--mut)">Adj Matrix</a></span>
</header>
<div id="out"></div>
<div class="toast" id="toast"></div>
<script>
"use strict";
const SYMS=["SPX","SPY","QQQ","RUT","IWM"];let SYM="SPX",MODE="mock",LAST=null,ACCTS=[],VIEW="scan";
async function loadAccts(){
 try{const r=await fetch(`/api/accounts?mode=${MODE}`);ACCTS=await r.json();
  if(ACCTS.error)throw 0;}catch(e){ACCTS=[];}
 $("acct").innerHTML=ACCTS.map(a=>`<option value="${a.account}" data-nlv="${a.nlv||''}">${a.account}${a.nlv?` ($${Math.round(a.nlv/1000)}k)`:''}</option>`).join("")||'<option value="">no accounts</option>';
}
function acct(){const o=$("acct").selectedOptions[0];return o?{account:o.value,nlv:o.dataset.nlv}:{account:"",nlv:""};}
const $=id=>document.getElementById(id);
$("tabs").innerHTML=SYMS.map(s=>`<button data-s="${s}" class="${s===SYM?'on':''}">${s}</button>`).join("");
$("tabs").onclick=e=>{const b=e.target.closest("button");if(!b)return;SYM=b.dataset.s;
 document.querySelectorAll("#tabs button").forEach(x=>x.classList.toggle("on",x.dataset.s===SYM));refresh();};
$("modes").onclick=e=>{const b=e.target.closest("button");if(!b)return;MODE=b.dataset.m;
 document.querySelectorAll("#modes button").forEach(x=>x.classList.toggle("on",x.dataset.m===MODE));loadAccts();};
$("scan").onclick=()=>{VIEW="scan";scan();};
$("sentinel").onclick=()=>{VIEW="sentinel";sentinel();};
$("direction").onclick=()=>{VIEW="direction";direction(false);};
$("smsf").onclick=()=>{VIEW="smsf";smsf(false);};
function refresh(){return VIEW==="sentinel"?sentinel():VIEW==="direction"?direction(false):VIEW==="smsf"?smsf(false):scan();}
// --------------------------------------------------------------- SMSF view --
let SINTENT="auto",SMODE="auto",SLAST=null,SSYM="SPX";
function sctl(){
 return `<div class="ctxrow" style="align-items:center">
  <span class="tabs" id="ssym">${["SPX","RUT"].map(x=>`<button data-s="${x}" class="${x===SSYM?'on':''}">${x}</button>`).join("")}</span>
  <span class="tabs" id="sintent">${["auto","bull","neutral","bear"].map(x=>`<button data-i="${x}" class="${x===SINTENT?'on':''}">${x==="auto"?"Auto":x==="bull"?"Bull Δ":x==="bear"?"Bear Δ":"Neutral"}</button>`).join("")}</span>
  <span class="modes" id="smode">${["auto","live","yf","mock"].map(x=>`<button data-m="${x}" class="${x===SMODE?'on':''}">${x}</button>`).join("")}</span>
  <button id="sgo">Go</button>
  <a href="/static/smsf_playbook.html" target="_blank" style="color:var(--jade);font-family:var(--mono);font-size:11px">build guide ↗</a></div>
  <div class="bookbar">GATE S — cash-account single-expiry selector: IV band × 25Δ skew × term × bias. All variants one expiry; adjustments debit-side only. Advisory, never a block.</div>
  <div id="sres"></div>`;
}
function smsf(run){
 $("out").innerHTML=sctl();
 $("ssym").onclick=e=>{const b=e.target.closest("button");if(!b)return;SSYM=b.dataset.s;
  document.querySelectorAll("#ssym button").forEach(x=>x.classList.toggle("on",x.dataset.s===SSYM));};
 $("sintent").onclick=e=>{const b=e.target.closest("button");if(!b)return;SINTENT=b.dataset.i;
  document.querySelectorAll("#sintent button").forEach(x=>x.classList.toggle("on",x.dataset.i===SINTENT));};
 $("smode").onclick=e=>{const b=e.target.closest("button");if(!b)return;SMODE=b.dataset.m;
  document.querySelectorAll("#smode button").forEach(x=>x.classList.toggle("on",x.dataset.m===SMODE));};
 $("sgo").onclick=sfetch;
 if(SLAST)renderSmsf(SLAST);
 if(run)sfetch();
}
async function sfetch(){
 $("status").textContent=`smsf ${SSYM} ${SINTENT} (${SMODE})…`;
 try{
  const r=await fetch(`/api/smsf?symbol=${SSYM}&intent=${SINTENT}&mode=${SMODE}`);
  const d=await r.json();if(d.error)throw new Error(d.error);
  SLAST=d;renderSmsf(d);
  $("status").textContent=`${SSYM} · ${d.mode} · ${new Date().toLocaleTimeString()}`;
 }catch(e){$("status").textContent="error";toast("SMSF failed: "+e.message);}
}
function renderSmsf(d){
 const inp=d.inputs;
 const acls=/STAND ASIDE/.test(d.action)?"warn":/DE-GROSS/.test(d.action)?"stop":"go";
 let h=`<div class="verdict ${acls}">${d.action}</div>`;
 h+=`<div class="bookbar">Gate S · bias: ${d.bias>0?"bull":d.bias<0?"bear":"neutral"} · intent: ${d.intent}</div>`;
 h+=`<div class="ctxrow">
  <span class="chip">IV30 <b>${inp.iv30}</b> band <b>${inp.iv_band}</b> (${inp.iv_band_src})</span>
  <span class="chip">rr25 <b>${fmt(inp.rr25_30d,1)}v</b> skew <b>${inp.skew_rich?"RICH":"norm"}</b></span>
  <span class="chip">VRP fwd <b>${fmt(inp.vrp_fwd,1)}v</b> HAR ${inp.har_rv}</span>
  <span class="chip">term <b>${inp.term||"—"}</b></span>
  <span class="chip">regime bias <b>${fmt(inp.regime_bias,0)}</b> trend <b>${inp.trend}</b></span>
  <span class="chip">spot <b>${inp.spot}</b></span></div>`;
 if(d.structures.length){
  h+=`<div class="cards">`+d.structures.map(s=>{
   const b=s.build;
   return `<div class="card"><div class="fam">#${s.rank}</div><h3>${s.label}</h3>
    <ul class="why"><li>${s.why}</li></ul>
    <div style="font-family:var(--mono);font-size:11px;color:var(--mut);border-top:1px solid var(--line);padding-top:6px">
     <div><b style="color:var(--jade)">DTE</b> ${b.dte}</div>
     <div><b style="color:var(--jade)">BODY</b> ${b.body}</div>
     <div><b style="color:var(--jade)">WINGS</b> ${b.wings}</div>
     <div><b style="color:var(--amber)">CASH</b> ${b.cash}</div>
     <div><b style="color:var(--amber)">MANAGE</b> ${b.manage}</div>
    </div></div>`;}).join("")+`</div>`;
 }
 if(d.notes.length)h+=`<div class="warnbox">${d.notes.map(n=>"⚠ "+n).join("<br>")}</div>`;
 h+=`<div class="bookbar">${d.data.note||""}${d.fallback_chain?` · fallbacks tried: ${d.fallback_chain.join(" | ")}`:""}</div>`;
 $("sres").innerHTML=h;
}
// ---------------------------------------------------------- Direction view --
let DINTENT="auto",DMODE="auto",DLAST=null;
function dctl(){
 const sym=($("dsym")&&$("dsym").value.trim().toUpperCase())||SYM;
 return `<div class="ctxrow" style="align-items:center">
  <input id="dsym" value="${sym}" style="background:var(--panel);border:1px solid var(--line);color:var(--txt);padding:6px;width:80px;font:inherit;text-transform:uppercase" placeholder="ticker">
  <span class="tabs" id="dintent">${["long","short","vol","auto"].map(x=>`<button data-i="${x}" class="${x===DINTENT?'on':''}">${x==="long"?"Long Δ":x==="short"?"Short Δ":x==="vol"?"Vol":"Auto"}</button>`).join("")}</span>
  <span class="modes" id="dmode">${["auto","live","yf","mock"].map(x=>`<button data-m="${x}" class="${x===DMODE?'on':''}">${x}</button>`).join("")}</span>
  <button id="dgo">Go</button></div>
  <div class="bookbar">GATE 1 — delta vs vol play (forward VRP) · GATE 2 — structure matrix (IV band × 25Δ skew × term). Advisory, never a block. yf = delayed ~15-20 min; SPX/NDX/RUT proxied via SPY/QQQ/IWM.</div>
  <div id="dres"></div>`;
}
function direction(run){
 $("out").innerHTML=dctl();
 $("dintent").onclick=e=>{const b=e.target.closest("button");if(!b)return;DINTENT=b.dataset.i;
  document.querySelectorAll("#dintent button").forEach(x=>x.classList.toggle("on",x.dataset.i===DINTENT));};
 $("dmode").onclick=e=>{const b=e.target.closest("button");if(!b)return;DMODE=b.dataset.m;
  document.querySelectorAll("#dmode button").forEach(x=>x.classList.toggle("on",x.dataset.m===DMODE));};
 $("dgo").onclick=dfetch;
 $("dsym").onkeydown=e=>{if(e.key==="Enter")dfetch();};
 if(DLAST)renderDirection(DLAST);
 if(run)dfetch();
}
async function dfetch(){
 const sym=$("dsym").value.trim().toUpperCase()||SYM;
 $("status").textContent=`direction ${sym} ${DINTENT} (${DMODE})…`;
 try{
  const r=await fetch(`/api/direction?symbol=${sym}&intent=${DINTENT}&mode=${DMODE}`);
  const d=await r.json();if(d.error)throw new Error(d.error);
  DLAST=d;renderDirection(d);
  $("status").textContent=`${sym} · ${d.mode} · ${new Date().toLocaleTimeString()}`;
 }catch(e){$("status").textContent="error";toast("Direction failed: "+e.message);}
}
function renderDirection(d){
 const inp=d.inputs;
 const acls=/STAND ASIDE|NO VOL EDGE/.test(d.action)?"warn":"go";
 let h=`<div class="verdict ${acls}">${d.action}</div>`;
 h+=`<div class="bookbar">Gate 1: ${d.play.replace("_"," ")}${d.side?` · side: ${d.side}`:""} · intent: ${d.intent}</div>`;
 h+=`<ul class="why">${d.play_why.map(x=>`<li>${x}</li>`).join("")}</ul>`;
 h+=`<div class="ctxrow">
  <span class="chip">IV30 <b>${inp.iv30}</b> band <b>${inp.iv_band}</b> (${inp.iv_band_src})</span>
  <span class="chip">VRP <b>${fmt(inp.vrp,1)}v</b> fwd <b>${fmt(inp.vrp_fwd,1)}v</b> HAR ${inp.har_rv}</span>
  <span class="chip">rr25 <b>${fmt(inp.rr25_30d,1)}v</b> skew <b>${inp.skew_rich?"RICH":"norm"}</b></span>
  <span class="chip">term <b>${inp.term||"—"}</b></span>
  <span class="chip">bias <b>${fmt(inp.bias,0)}</b> trend <b>${inp.trend}</b></span>
  <span class="chip">spot <b>${inp.spot}</b></span></div>`;
 if(d.structures.length){
  h+=`<div class="cards">`+d.structures.map(s=>
   `<div class="card"><div class="fam">#${s.rank}</div><h3>${s.label}</h3>
    <ul class="why"><li>${s.why}</li></ul></div>`).join("")+`</div>`;
 }
 if(d.notes.length)h+=`<div class="warnbox">${d.notes.map(n=>"⚠ "+n).join("<br>")}</div>`;
 h+=`<div class="bookbar">${d.data.note||""}${d.fallback_chain?` · fallbacks tried: ${d.fallback_chain.join(" | ")}`:""}</div>`;
 $("dres").innerHTML=h;
}
function toast(t){const e=$("toast");e.textContent=t;e.style.display="block";setTimeout(()=>e.style.display="none",6000);}
function fmt(x,d=2){return(x>=0?"+":"")+(+x).toFixed(d);}
async function scan(){
 $("status").textContent="scanning "+SYM+" ("+MODE+")…";
 try{
  const a=acct();const r=await fetch(`/api/suggest?symbol=${SYM}&mode=${MODE}&account=${a.account}&nlv=${a.nlv}`);const d=await r.json();
  if(d.error)throw new Error(d.error);LAST=d;render(d);
  $("status").textContent=`${SYM} spot ${d.spot} · ${MODE} · ${new Date().toLocaleTimeString()}`;
 }catch(e){$("status").textContent="error";toast("Scan failed: "+e.message);}
}
async function sentinel(){
 $("status").textContent="sentinel "+SYM+" ("+MODE+")…";
 try{
  const r=await fetch(`/api/sentinel?symbol=${SYM}&mode=${MODE}`);const d=await r.json();
  if(d.error)throw new Error(d.error);renderSentinel(d);
  $("status").textContent=`sentinel ${SYM} · ${MODE} · ${new Date().toLocaleTimeString()}`;
 }catch(e){$("status").textContent="error";toast("Sentinel failed: "+e.message);}
}
function renderSentinel(d){
 const nAct=d.cards.reduce((n,c)=>n+c.conflicts.filter(x=>x.severity==="act").length,0);
 let h=`<div class="verdict ${nAct?'warn':'go'}">SENTINEL — ${d.headline}</div>`;
 h+=`<div class="cards">`+d.cards.map(sentinelCard).join("")+`</div>`;
 if(!d.cards.length)h+=`<p style="color:var(--mut)">No accounts found for ${MODE} mode.</p>`;
 $("out").innerHTML=h;
}
function sentinelCard(c){
 const g=c.greeks,b=c.budget;
 let h=`<div class="card"><div class="fam">${c.pool}</div><h3>${c.label}</h3>
  <div class="nums">
   <span><b>Δ delta</b>${fmt(g.delta)}</span>
   <span><b>γ gamma</b>${fmt(g.gamma,3)}</span>
   <span><b>ν vega</b>${fmt(g.vega)}</span>
   <span><b>θ theta</b>${fmt(g.theta)}</span>
   <span><b>budget</b>±Δ${(+b.delta).toFixed(2)} ±ν${Math.round(b.vega)}</span></div>`;
 if(c.aligned){
  h+=`<div class="bookbar"><span class="pos">✓ aligned with regime — no adjustment forced</span></div>`;
  h+=`<div class="legs">standing structures for this regime:</div>`;
  h+=`<ul class="why">`+c.standing_plays.map(p=>
   `<li><b>${p.family}</b> [${p.side}] — ${p.intent}</li>`).join("")+`</ul>`;
 }else{
  h+=`<div class="warnbox">`+c.conflicts.map(cf=>
   (cf.severity==="act"?`⚠ <b>ACT — ${cf.name}</b>: `:`⚠ ${cf.name}: `)+cf.message).join("<br>")+`</div>`;
  h+=`<div class="legs">suggested adjustments (regime-fit + Greek-fix):</div>`;
  h+=`<ul class="why">`+c.suggestions.map(s=>
   `<li><b>${s.family}</b> [${s.side}] · fix ${fmt(s.fix_score,0)} — ${s.intent}`+
   (s.blocked?` <span class="neg">⛔ ${s.block_reason}</span>`:"")+`</li>`).join("")+`</ul>`;
 }
 return h+`</div>`;
}
function vclass(v){return v.startsWith("TRADE —")||v.startsWith("CAUTION")?"warn":v.startsWith("TRADE")?"go":v.startsWith("MARGINAL")?"warn":"stop";}
function render(d){
 const r=d.regime,t=r.term||{};
 let h=`<div class="verdict ${vclass(d.verdict)}">${d.verdict}</div>`;
 h+=`<div class="ctxrow">
  <span class="chip">vol <b>${r.vol_state}</b> pctl ${r.iv_pctl}%</span>
  <span class="chip">trend <b>${r.trend}</b> adx ${r.adx}</span>
  <span class="chip">tape <b>${r.gamma}</b> (${r.gamma_score})</span>
  <span class="chip">VRP <b>${fmt(r.vrp,1)}v</b> rv21 ${r.rv21}</span>
  <span class="chip">curve <b>${t.verdict||"—"}</b> 9/30 ${t.rat_front||"—"}</span>
  <span class="chip">bias <b>${fmt(r.bias,0)}</b></span>
  <span class="chip">FOMC <b>d-${d.events.fomc_dte}</b>${d.events.opex_week?" · OpEx wk":""}${d.events.post_opex?" · post-OpEx":""}</span>${
  d.walls?`<span class="chip">OI ${d.walls.expiry.slice(5)}: put wall <b>${d.walls.put_wall.strike}</b> · call wall <b>${d.walls.call_wall.strike}</b> · pin <b>${d.walls.pin.strike}</b> · GEX <b>${d.walls.gex_sign}</b></span>`:""}</div>`;
 if(d.gates.length)h+=`<div class="warnbox">${d.gates.map(g=>g.hard?`⚠ <b>${g.msg}</b>`:`⚠ ${g.msg}`).join("<br>")}</div>`;
 if(d.book&&d.book.greeks){const g=d.book.greeks;
  h+=`<div class="bookbar">BOOK ${SYM}: ${d.book.positions} legs · Δ ${fmt(g.delta)} γ ${fmt(g.gamma,3)} θ ${fmt(g.theta)} ν ${fmt(g.vega)}`+
   (d.book.excluded_long_dte?` (+${d.book.excluded_long_dte} long-DTE campaign legs excluded)`:"")+
   (d.book_warnings.length?` — <span class="neg">${d.book_warnings.join(" · ")}</span>`:"")+`</div>`;
  if(d.book.stress&&d.book.stress.length)
   h+=`<div class="bookbar">STRESS: ${d.book.stress.map(s=>
    `${s.name} <span class="${s.pnl<0?'neg':'pos'}">${s.pnl<0?'-':'+'}$${Math.abs(s.pnl).toLocaleString()}</span>`).join(" · ")}</div>`;}
 h+=`<div class="cards">`+d.cards.map((c,i)=>card(c,i)).join("")+`</div>`;
 if(!d.cards.length)h+=`<p style="color:var(--mut)">No structures cleared the strategy filters for this surface — manage existing only. (See warnings above.)</p>`;
 $("out").innerHTML=h;
}
function card(c,i){
 const cr=c.net_mid<0;
 return `<div class="card">
  <div class="fam">${c.strategy}</div><h3>${c.label}</h3>
  <div class="legs">${c.legs.join("<br>")}</div>
  <div class="nums">
   <span><b>${cr?"credit":"debit"} (${c.mid_src||"model"})</b><span class="amb">${Math.abs(c.net_mid).toFixed(2)}</span></span>
   <span><b>max P</b><span class="pos">${fmt(c.max_profit,1)}</span></span>
   <span><b>max L</b><span class="neg">${fmt(c.max_loss,1)}</span></span>
   <span><b>BEs</b>${(c.breakevens||[]).join(" / ")||"—"}</span>
   <span><b>θ/ν/Δ</b>${fmt(c.greeks.theta)} / ${fmt(c.greeks.vega)} / ${fmt(c.greeks.delta)}</span>
   <span><b>score</b><span class="amb">${c.score}</span></span></div>
  <ul class="why">${c.rationale.map(x=>`<li>${x}</li>`).join("")}</ul>
  <div class="cbtns">
   <button onclick="payoff(${i})">Risk graph</button>
   <button onclick="openOS(${i})">OptionStrat ↗</button>
   <button class="stagebtn" onclick="stage(${i})">Stage to TWS</button></div>
  <div id="g${i}"></div></div>`;
}
const OCC_ROOT={SPX:"SPXW",RUT:"RUTW"};   // weekly option roots; ETFs use the symbol
function osUrl(c){
 const sym=(LAST&&LAST.symbol)||SYM,root=OCC_ROOT[sym]||sym;
 const legs=c.legs_raw.map(l=>{
  const d=l.expiry.replaceAll("-","").slice(2);          // 2026-06-26 -> 260626
  const q=Math.abs(l.qty);
  return (l.qty<0?"-":"")+"."+root+d+l.cp+(+l.strike)+(q>1?"x"+q:"");
 }).join(",");
 return `https://optionstrat.com/build/custom/${sym}/${legs}`;
}
function openOS(i){window.open(osUrl(LAST.cards[i]),"_blank");}
async function payoff(i){
 const c=LAST.cards[i];
 const r=await fetch("/api/payoff",{method:"POST",headers:{"Content-Type":"application/json"},
  body:JSON.stringify({spot:LAST.spot,legs:c.legs_raw,net_mid:c.net_mid})});
 const d=await r.json();const W=420,H=170,pl=44,pb=18;
 const ymax=Math.max(...d.expiry,...d.t5,1),ymin=Math.min(...d.expiry,...d.t5,-1);
 const X=j=>pl+j/(d.x.length-1)*(W-pl-6),Y=p=>6+(ymax-p)/(ymax-ymin)*(H-pb-12);
 const path=a=>a.map((p,j)=>(j?"L":"M")+X(j).toFixed(1)+","+Y(p).toFixed(1)).join(" ");
 let seg="";for(let j=1;j<d.x.length;j++){const col=(d.expiry[j-1]+d.expiry[j])/2>=0?"var(--jade)":"var(--red)";
  seg+=`<line x1="${X(j-1)}" y1="${Y(d.expiry[j-1])}" x2="${X(j)}" y2="${Y(d.expiry[j])}" stroke="${col}" stroke-width="2"/>`;}
 $("g"+i).innerHTML=`<svg viewBox="0 0 ${W} ${H}">
  <line x1="${pl}" y1="${Y(0)}" x2="${W-6}" y2="${Y(0)}" stroke="var(--line)"/>
  ${seg}<path d="${path(d.t5)}" fill="none" stroke="var(--amber)" stroke-width="1.4" stroke-dasharray="5 4"/>
  <text x="${pl}" y="${H-4}" fill="var(--mut)" font-size="9" font-family="var(--mono)">${d.x[0]}</text>
  <text x="${W-6}" y="${H-4}" fill="var(--mut)" font-size="9" font-family="var(--mono)" text-anchor="end">${d.x[d.x.length-1]}</text>
  <text x="${W-8}" y="14" fill="var(--jade)" font-size="9" font-family="var(--mono)" text-anchor="end">— front expiry</text>
  <text x="${W-8}" y="26" fill="var(--amber)" font-size="9" font-family="var(--mono)" text-anchor="end">- - T+5</text></svg>`;
}
async function stage(i){
 const c=LAST.cards[i];
 if(!confirm(`Stage ${c.label} (${MODE} · ${acct().account||"default acct"})?\n${c.legs.join("\n")}\nnet ${c.net_mid}`))return;
 const r=await fetch("/api/stage",{method:"POST",headers:{"Content-Type":"application/json"},
  body:JSON.stringify({symbol:SYM,mode:MODE,account:acct().account,legs:c.legs_raw,net_mid:c.net_mid,qty:1})});
 const d=await r.json();
 if(d.error)return toast("Stage failed: "+d.error);
 toast(`${d.status} · order ${d.orderId}`+(d.margin_change!=null?` · margin Δ $${(+d.margin_change).toFixed(0)}`:"")+(d.note?" · "+d.note:""));
}
loadAccts().then(scan);
</script></body></html>
